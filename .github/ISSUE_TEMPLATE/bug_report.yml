name: Bug report
description: Report a reproducible issue with evidence.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Include command, exit code, and sanitized raw log path. Do not include secrets.
    validations:
      required: true
